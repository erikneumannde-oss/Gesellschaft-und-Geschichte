<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Politische Bildung</title>

  <style>
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:#f4f6fa;
      color:#111;
    }

    header{
      padding:24px;
      background:white;
      border-bottom:1px solid #ddd;
      text-align:center;
    }

    h1{
      margin:0;
      font-size:1.5rem;
    }

    .container{
      max-width:900px;
      margin:40px auto;
      padding:20px;
      display:grid;
      gap:20px;
    }

    .card{
      background:white;
      border:1px solid #ddd;
      border-radius:18px;
      padding:30px;
      text-decoration:none;
      color:#111;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
      transition:transform .05s ease;
    }

    .card:hover{
      transform:translateY(-3px);
    }

    .card:active{
      transform:scale(0.98);
    }

    .card h2{
      margin-top:0;
    }

    .card p{
      color:#555;
      margin-bottom:0;
    }

    footer{
      margin-top:60px;
      padding:20px;
      text-align:center;
      border-top:1px solid #ddd;
      background:white;
      font-size:0.9rem;
    }

    footer a{
      text-decoration:none;
      color:#555;
      font-weight:bold;
    }
  </style>
</head>

<body>

<header>
  <h1>Politische Bildung – Werkzeuge</h1>
</header>

<div class="container">

  <a class="card" href="./tools/Smartphone-Lieferkette/">
    <h2>Smartphone-Lieferkette</h2>
    <p>Globale Produktionsketten, Rohstoffe, Transportwege und Wertschöpfung analysieren.</p>
  </a>

  <a class="card" href="./tools/Textmarkierer/student.html">
    <h2>Textmarkierer (Schüler)</h2>
    <p>PDF-Texte markieren, kategorisieren und mit Erwartungshorizont auswerten.</p>
  </a>

</div>

<footer>
  <a href="../index.html">Zurück zur Startseite</a>
</footer>

</html>
